<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#061426" />
  <title>Level Up Pro X</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <img src="logo.png" alt="Level Up logo" class="brand-logo" />
        <div>
          <div class="brand-title">LEVEL UP</div>
          <div class="brand-pro">PRO</div>
          <div class="brand-sub">PROPERTY RENOVATION</div>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-btn active" data-page="dashboard">🏠 <span>Dashboard</span></button>
        <button class="nav-btn" data-page="customers">👥 <span>Customers</span></button>
        <button class="nav-btn" data-page="quotes">📄 <span>Quotes</span></button>
        <button class="nav-btn" data-page="jobs">📋 <span>Jobs</span></button>
        <button class="nav-btn" data-page="invoices">💷 <span>Invoices</span></button>
        <button class="nav-btn" data-page="materials">📦 <span>Materials</span></button>
        <button class="nav-btn" data-page="settings">⚙️ <span>Settings</span></button>
      </nav>

      <div class="company-card">
        <strong>LEVEL UP</strong><br>
        <span>PROPERTY RENOVATION</span>
        <p>📞 07701 369715</p>
        <p>✉️ info@levelup-propertyrenovation.co.uk</p>
      </div>
    </aside>

    <main class="main">
      <header class="top">
        <button id="menuBtn" class="icon-btn">☰</button>
        <div>
          <h1 id="pageTitle">Good evening, Callum 👋</h1>
          <p id="pageSub">Here’s what’s happening with your business today.</p>
        </div>
        <div class="top-actions">
          <button class="icon-btn">🔎</button>
          <button class="icon-btn">🔔</button>
          <button class="add-btn" id="quickQuote">+</button>
        </div>
      </header>

      <section id="dashboard" class="page active"></section>
      <section id="customers" class="page"></section>
      <section id="quotes" class="page"></section>
      <section id="jobs" class="page"></section>
      <section id="invoices" class="page"></section>
      <section id="materials" class="page"></section>
      <section id="settings" class="page"></section>
    </main>

    <nav class="bottom-nav">
      <button class="bottom-btn active" data-page="dashboard">🏠<span>Home</span></button>
      <button class="bottom-btn" data-page="quotes">📄<span>Quotes</span></button>
      <button class="bottom-btn" data-page="jobs">📋<span>Jobs</span></button>
      <button class="bottom-btn" data-page="customers">👥<span>Customers</span></button>
      <button class="bottom-btn" data-page="materials">📦<span>More</span></button>
    </nav>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <button class="modal-close" id="closeModal">×</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
